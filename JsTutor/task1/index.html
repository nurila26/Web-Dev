<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo List</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #fff;
        margin: 0;
        padding: 0;
    }
    
    .header {
        background-color: #222;
        color: white;
        padding: 10px 20px;
        padding-left: 50px;
        font-size: 18px;
    }
    
    .container {
        max-width: 500px;
        margin: 50px auto;
        text-align: left;
    }
    input[type="text"] {
        padding: 8px;
        width: 70%;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    button.add-btn {
        padding: 8px 12px;
        margin-left: 5px;
        background-color: #337ab7;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    button.add-btn:hover {
        background-color: #286090;
    }
    ul {
        list-style-type: none;
        padding: 0;
        margin-top: 20px;
    }
    li {
        padding: 10px;
        border: 1px solid #ddd;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: space-between; 
        border-radius: 4px;
    }
  
    .task-left {
        display: flex;
        align-items: center;
    }
    .task-left span {
        margin-left: 10px; 
    }
  
    input[type="checkbox"] {
        accent-color: #337ab7;
        width: 18px;
        height: 18px;
        cursor: pointer;
    }
 
    li.completed .task-left span {
        text-decoration: line-through;
        color: #999; 
    }
    .trash {
        color: red;
        cursor: pointer;
        font-size: 18px;
    }

 
    .title-row h2 {
        margin: 0 0 20px 0;
        font-size: 24px;
    }

   
    .input-row {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }
</style>
</head>
<body>

<div class="header">ToDo List</div>

<div class="container">
 
    <div class="title-row">
        <h2>ToDo List</h2>
    </div>

   
    <div class="input-row">
        <input type="text" id="taskInput" placeholder="New Task">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList">
        <li>
            <div class="task-left">
                <input type="checkbox" onclick="toggleTask(this)" checked>
                <span>First item</span>
            </div>
            <span class="trash" onclick="deleteTask(this)">🗑️</span>
        </li>
        <li>
            <div class="task-left">
                <input type="checkbox" onclick="toggleTask(this)">
                <span>Second item</span>
            </div>
            <span class="trash" onclick="deleteTask(this)">🗑️</span>
        </li>
        <li>
            <div class="task-left">
                <input type="checkbox" onclick="toggleTask(this)">
                <span>Third item</span>
            </div>
            <span class="trash" onclick="deleteTask(this)">🗑️</span>
        </li>
    </ul>
</div>

<script>
function addTask() {
    const input = document.getElementById('taskInput');
    const value = input.value.trim();
    if (!value) return;

    const li = document.createElement('li');
    li.innerHTML = `
        <div class="task-left">
            <input type="checkbox" onclick="toggleTask(this)">
            <span>${value}</span>
        </div>
        <span class="trash" onclick="deleteTask(this)">🗑️</span>
    `;
    document.getElementById('taskList').appendChild(li);
    input.value = '';
}

function toggleTask(checkbox) {
    const li = checkbox.closest('li');
    if (checkbox.checked) {
        li.classList.add('completed'); 
    } else {
        li.classList.remove('completed'); 
    }
}

function deleteTask(trash) {
    const li = trash.closest('li');
    li.remove();
}
</script>

</body>
</html>
