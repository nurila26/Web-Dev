<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Function min</title>
</head>
<body>

<script>
function minIf(a, b) {
  if (a < b) return a;
  else return b;
}


function minTernary(a, b) {
  return a < b ? a : b;
}

alert(minIf(2, 5));       
alert(minTernary(3, -1)); 
alert(minTernary(1, 1));  
</script>

</body>
</html>
