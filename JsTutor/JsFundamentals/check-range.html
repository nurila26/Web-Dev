<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Check Range Not</title>
</head>
<body>

<script>
let age = 25;

// Variant 1: using NOT !
if (!(age >= 14 && age <= 90)) {
  alert("Age is NOT between 14 and 90 inclusively");
}

// Variant 2: without NOT
if (age < 14 || age > 90) {
  alert("Age is NOT between 14 and 90 inclusively");
}
</script>

</body>
</html>
