<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count Object Properties</title>
</head>
<body>
  <script>
    
    function count(obj) {
      return Object.keys(obj).length;
    }

    let user = {
      name: 'John',
      age: 30
    };

    alert("Number of properties: " + count(user)); 
  </script>
</body>
</html>
