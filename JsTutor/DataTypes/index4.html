<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Salary</title>
</head>
<body>
  <script>
    let salaries = {
      "John": 100,
      "Pete": 300,
      "Mary": 250
    };

    function topSalary(salaries) {
      let maxSalary = 0;
      let maxName = null;

      for (const [name, salary] of Object.entries(salaries)) {
        if (salary > maxSalary) {
          maxSalary = salary;
          maxName = name;
        }
      }

      return maxName;
    }

    alert("Top-paid person: " + topSalary(salaries)); 
  </script>
</body>
</html>
